<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphify - Premium Coordinate Grapher</title>
    <meta name="description" content="A powerful, interactive, and beautiful mathematical equation plotter with coordinates." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <div id="controls-panel" class="controls-panel">
        <header>
          <h1>Graphify</h1>
          <p>Beautiful equation plotter</p>
        </header>

        <section id="equation-section" class="equation-list">
          <!-- Equations will be added here dynamically -->
        </section>

        <button id="add-equation-btn" class="add-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Function
        </button>

        <div class="settings-section">
          <div class="settings-row">
            <span>Grid Intensity</span>
            <input type="range" id="grid-range" min="0" max="100" value="40" />
          </div>
          <div class="settings-row">
            <span>Show Labels</span>
            <input type="checkbox" id="show-labels" checked />
          </div>
        </div>

        <div class="settings-section">
          <p style="font-size: 11px; opacity: 0.6;">Use [x] as the variable. Example: sin(x^2) + cos(x)</p>
        </div>
      </div>

      <canvas id="viewport"></canvas>

      <div class="coord-display">
        (x) <span id="x-coord">0.00</span>, (y) <span id="y-coord">0.00</span>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
