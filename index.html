<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphify - Premium Coordinate Grapher</title>
    <meta name="description" content="A powerful, interactive, and beautiful mathematical equation plotter with coordinates." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <div id="controls-panel" class="controls-panel">
        <header>
          <h1>Squiggles 🎨</h1>
          <p>Don't be a square, be a sine wave.</p>
        </header>

        <section id="equation-section" class="equation-list">
          <!-- Squiggles will appear here -->
        </section>

        <div class="button-group">
          <button id="add-equation-btn" class="add-btn">
            <span>✨ Unleash a Squiggle</span>
          </button>
          <button id="chaos-btn" class="chaos-btn" title="Generate Mathematical Chaos">
            🎲 Surprise Me
          </button>
        </div>

        <div class="settings-section">
          <div class="settings-row">
            <span>Grid Invisibility Cloak</span>
            <input type="range" id="grid-range" min="0" max="100" value="60" />
          </div>
          <div class="settings-row">
            <span>Show Boring Numbers</span>
            <input type="checkbox" id="show-labels" checked />
          </div>
        </div>

        <div class="info-box">
          <b>Pro Tip:</b> Math is just drawing with numbers. Try <code>tan(sin(x)) * 5</code> for some real weirdness.
        </div>
      </div>

      <canvas id="viewport"></canvas>

      <div class="coord-display">
        <div class="fun-label">Where are we?</div>
        <div>x: <b id="x-coord">0.000</b></div>
        <div>y: <b id="y-coord">0.000</b></div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
