<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphify - Premium Coordinate Grapher</title>
    <meta name="description" content="A powerful, interactive, and beautiful mathematical equation plotter with coordinates." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <div id="controls-panel" class="controls-panel">
        <header>
          <h1>Squiggles 🎨</h1>
          <p>The universe's favorite wiggle simulator.</p>
        </header>

        <section id="equation-section" class="equation-list">
          <!-- Squiggles will appear here -->
        </section>

        <div class="button-group">
          <button id="add-equation-btn" class="add-btn">
            <span>✨ Unleash a Squiggle</span>
          </button>
          <button id="chaos-btn" class="chaos-btn" title="Generate Mathematical Chaos">
            🎲
          </button>
        </div>

        <div class="settings-section">
          <div class="settings-row">
            <span>Grid Invisibility Cloak</span>
            <input type="range" id="grid-range" min="0" max="100" value="70" />
          </div>
          <div class="settings-row">
            <span>Show Boring Numbers</span>
            <input type="checkbox" id="show-labels" checked />
          </div>
          <div class="settings-row">
            <span>Embrace the Dark Side (Negative X)?</span>
            <input type="checkbox" id="allow-negative" />
          </div>
        </div>

        <div class="zoom-controls">
          <button id="zoom-in" title="Mega-Zoom In">+</button>
          <button id="zoom-out" title="Mega-Zoom Out">−</button>
        </div>

        <button id="party-btn" class="party-btn">
          🌈 Party Mode: OFF
        </button>

        <div id="pun-box" class="info-box">
          <b>Pun of the Day:</b> Why was the equal sign so humble? Because he knew he wasn't less than or greater than anyone else!
        </div>
      </div>

      <canvas id="viewport"></canvas>

      <div class="coord-display">
        <div class="fun-label">Current Dimension</div>
        <div>x: <b id="x-coord">0.000</b></div>
        <div>y: <b id="y-coord">0.000</b></div>
      </div>

      <div id="cursor-follower" class="cursor-follower">✨</div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
